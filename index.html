<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mini WhatsApp</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; }
        #chatbox { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #ece5dd; }
        .message { margin-bottom: 5px; padding: 5px 10px; background: white; border-radius: 10px; display: inline-block; clear: both;}
        #interface-chat { display: none; }
        input[type="text"] { width: 75%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 15px; border: none; background: #25D366; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>💬 Mini WhatsApp</h1>

    <div id="login">
        <input type="text" id="username" placeholder="Entrez votre pseudo..." autocomplete="off"/>
        <button onclick="connect()">Se connecter</button>
    </div>

    <div id="interface-chat">
        <div id="chatbox"></div>
        <form onsubmit="sendMessage(event)">
            <input type="text" id="messageText" autocomplete="off" placeholder="Écrivez un message..."/>
            <button type="submit">Envoyer</button>
        </form>
    </div>

    <script>
        let ws;

        function connect() {
            const username = document.getElementById("username").value;
            if (!username) return alert("Veuillez entrer un pseudo.");

            // Connexion au backend FastAPI via WebSocket
            ws = new WebSocket(`ws://localhost:8000/ws/${username}`);
            
            // Que faire quand on reçoit un message du serveur ?
            ws.onmessage = function(event) {
                const chatbox = document.getElementById('chatbox');
                const messageDiv = document.createElement('div');
                messageDiv.className = "message";
                messageDiv.textContent = event.data;
                chatbox.appendChild(messageDiv);
                
                // Scroll automatique vers le bas
                chatbox.scrollTop = chatbox.scrollHeight;
            };

            // Cacher le login et afficher le chat
            document.getElementById("login").style.display = "none";
            document.getElementById("interface-chat").style.display = "block";
        }

        function sendMessage(event) {
            event.preventDefault(); // Empêche la page de se recharger
            const input = document.getElementById("messageText");
            if(input.value) {
                // Envoi du message au serveur
                ws.send(input.value);
                input.value = '';
            }
        }
    </script>
</body>
</html>
