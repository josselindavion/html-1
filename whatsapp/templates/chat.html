{% extends "base.html" %}
{% block title %}#{{ room.name }} – Mini WhatsApp{% endblock %}

{% block content %}
<header class="chat-header">
  <a href="/front/rooms?user_id={{ user.id }}" class="header-link back-link">←</a>
  <div class="room-header-avatar" data-name="{{ room.name }}">{{ room.name[0]|upper }}</div>
  <div class="chat-header-info">
    <h2># {{ room.name }}</h2>
    <span class="chat-header-sub">salon de discussion</span>
  </div>
  <span class="user-badge">{{ user.name }}</span>
</header>

<div class="chat-wrapper">
  <div id="messages" class="messages-list"></div>

  <form id="message-form" class="message-form">
    <input id="message-input" type="text" placeholder="Écrivez un message…" autocomplete="off">
    <button type="submit" class="send-btn" title="Envoyer">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </form>
</div>

<script>
  const ROOM_ID = {{ room.id }};
  const USER_ID = {{ user.id }};
  const USERNAME = "{{ user.name }}";
</script>
<script src="/static/js/avatar-colors.js"></script>
<script src="/static/js/chat.js"></script>
{% endblock %}
